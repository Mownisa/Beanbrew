services:
  - type: web
    name: beanbrew-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_CONN_STRING
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MCP_SERVER_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
